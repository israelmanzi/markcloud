{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}markcloud{{end}}</title>
  <link rel="canonical" href="{{.BaseURL}}{{.CurrentPath}}">
  {{if .IsDocument}}
  <meta name="description" content="{{.OGDescription}}">
  <meta property="og:title" content="{{.OGTitle}}">
  <meta property="og:description" content="{{.OGDescription}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{.BaseURL}}{{.CurrentPath}}">
  <meta property="og:site_name" content="markcloud">
  <meta property="og:image" content="{{.BaseURL}}/static/og.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{.OGTitle}}">
  <meta name="twitter:description" content="{{.OGDescription}}">
  <meta name="twitter:image" content="{{.BaseURL}}/static/og.svg">
  {{end}}
  <link rel="alternate" type="application/rss+xml" title="markcloud" href="/feed.xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="nav-brand">markcloud</a>
      <form method="GET" action="/" class="nav-search">
        <input type="text" name="q" placeholder="search..." value="{{.Query}}" autocomplete="off">
        {{if .Query}}<button type="button" class="clear-search" onclick="window.location='{{.CurrentPath}}'">clear</button>{{end}}
        <button type="submit">search</button>
      </form>
      <span class="nav-actions">
        <button type="button" class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#x25D1;</button>
        {{if .Authenticated}}
          <a href="/logout">logout</a>
        {{else}}
          <a href="/login">authenticate</a>
        {{end}}
      </span>
    </nav>
  </header>
  <main>
    {{block "content" .}}{{end}}
  </main>
  <footer class="site-footer">
    <span id="year"></span> <a href="https://www.israelmanzi.com" target="_blank" rel="noopener">Israel Manzi &#x2197;</a>
  </footer>
  <script>
    document.getElementById('year').textContent=new Date().getFullYear();
    (function(){
      var t=localStorage.getItem('theme');
      if(t)document.documentElement.setAttribute('data-theme',t);
    })();
    function toggleTheme(){
      var d=document.documentElement;
      var cur=d.getAttribute('data-theme')||
        (window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
      var c=cur==='dark'?'light':'dark';
      d.setAttribute('data-theme',c);
      localStorage.setItem('theme',c);
    }
  </script>
</body>
</html>{{end}}
