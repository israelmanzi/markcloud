{{template "layout" .}}
{{define "title"}}{{.Doc.Title}} - markcloud{{end}}
{{define "content"}}
<article>
  {{.Content}}
</article>
<footer class="doc-meta">
  <span class="date">{{humanDate .Doc.UpdatedAt}}</span>
  {{if .Doc.Public}}<span class="badge badge-public">public</span>{{else}}<span class="badge badge-private">private</span>{{end}}
  {{range .Doc.Tags}}<span class="tag">{{.}}</span>{{end}}
</footer>
{{end}}
